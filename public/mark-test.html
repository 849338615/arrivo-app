<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Arrivo mark · build verification</title>
    <style>
      html, body { margin: 0; background: #0E1520; color: #F1F4F7; font-family: ui-sans-serif, system-ui; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; padding: 48px; }
      .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; background: #131D2A; border: 1px solid #243244; border-radius: 16px; }
      .label { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #8D99A8; }
      svg { display: block; }
      h1 { padding: 32px 48px 0; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Build verification — current path</h1>
    <div class="grid">
      <div class="cell"><svg width="24" height="24" viewBox="0 0 64 64"><use href="#m"/></svg><div class="label">24px</div></div>
      <div class="cell"><svg width="44" height="44" viewBox="0 0 64 64"><use href="#m"/></svg><div class="label">44px (splash)</div></div>
      <div class="cell"><svg width="72" height="72" viewBox="0 0 64 64"><use href="#m"/></svg><div class="label">72px (loading)</div></div>
      <div class="cell"><svg width="160" height="160" viewBox="0 0 64 64"><use href="#m"/></svg><div class="label">160px hero</div></div>
    </div>

    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <linearGradient id="g" x1="14" y1="6" x2="50" y2="62" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#FFFFFF"/>
          <stop offset="0.5" stop-color="#E6ECF2"/>
          <stop offset="1" stop-color="#9FB0C2"/>
        </linearGradient>
        <symbol id="m" viewBox="0 0 64 64">
          <path d="M 11 51 C 10 35, 19 13, 32 4 C 45 13, 54 35, 53 51 C 46 31, 38 14, 32 4 C 26 14, 18 31, 11 51 Z" fill="url(#g)" fill-rule="evenodd"/>
          <path d="M 2 55 C 18 49, 46 49, 62 55 C 46 60, 18 60, 2 55 Z" fill="url(#g)"/>
          <path d="M 32 26 C 32 30, 33 30.8, 35.5 30.8 C 33 30.8, 32 31.6, 32 35.6 C 32 31.6, 31 30.8, 28.5 30.8 C 31 30.8, 32 30, 32 26 Z" fill="url(#g)"/>
        </symbol>
      </defs>
    </svg>
  </body>
</html>
